<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PionFlower — Детали букета</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="product-detail.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo">
                <div class="logo-icon">
                    <img src="img/logo.png" alt="PionFlower" class="logo-img" onerror="this.style.display='none'">
                </div>
                <div class="logo-text">PionFlower<span>студия цветов</span></div>
            </div>
            <div class="burger-menu" id="burger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="profile-section" id="profileSection"></div>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <a href="main.html" class="mobile-link">Главная</a>
            <a href="catalog.html" class="mobile-link">Каталог</a>
            <a href="delivery.html" class="mobile-link">Доставка</a>
            <a href="contacts.html" class="mobile-link">Контакты</a>
            <a href="profile.html" class="mobile-link">Личный кабинет</a>
        </div>
    </header>

    <main>
        <div class="container">
            <button class="back-btn" onclick="window.history.back()">← Назад</button>
            
            <div class="product-detail" id="productDetail">
                <!-- Динамическое содержимое будет загружено через JS -->
            </div>

            <!-- Модальное окно для покупки в 1 клик -->
            <div class="modal" id="quickOrderModal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>Быстрый заказ</h3>
                        <button class="modal-close" id="closeModalBtn">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="quickOrderForm">
                            <div class="form-group">
                                <input type="text" id="quickName" placeholder="Ваше имя" required>
                            </div>
                            <div class="form-group">
                                <input type="tel" id="quickPhone" placeholder="+7 (XXX) XXX-XX-XX" required>
                            </div>
                            <div class="form-group">
                                <textarea id="quickAddress" rows="2" placeholder="Адрес доставки (необязательно)"></textarea>
                            </div>
                            <button type="submit" class="btn-submit">Оформить заказ</button>
                        </form>
                        <p class="modal-hint">Мы свяжемся с вами для подтверждения заказа</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <div class="logo-icon">
                    <img src="img/logo.png" alt="PionFlower" class="logo-img" onerror="this.style.display='none'">
                </div>
                <div class="logo-text">PionFlower</div>
            </div>
            <div class="footer-copyright">© 2026, цветочная студия «PionFlower»</div>
            <div class="footer-contacts">
                <a href="tel:+78553123456">+7 (8553) 12-34-56</a>
                <a href="mailto:PionFlower@gmail.com">PionFlower@gmail.com</a>
            </div>
        </div>
    </footer>

    <script src="product-detail.js"></script>
    <script src="auth.js"></script>
    <script>

if (window.location.search.includes('admin=secret')) {
    window.location.href = 'admin.html';
}
</script>
